name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_ohnkck42WxZgazMwHmr3vs5T
          VERCEL_PROJECT_ID: prj_f2cEujnaGW1MsobsMEJcF48NypRh
